# reload config
bind r source-file ~/.tmux.conf \; display-message "Config reloaded..."

# image support
set -gq allow-passthrough on
set -g visual-activity off

# Undercurls
set -g default-terminal "tmux-256color"
set -sa terminal-overrides ",xterm-ghostty:Tc,xterm-ghostty:RGB"

# SGR underline style + underline color passthrough
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# set-option -g default-shell /bin/zsh
# set-option -g default-command /bin/zsh

set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin"

set-option -sg escape-time 10
set-option -g focus-events on

# vim-like pane switching
bind -r ^ last-window
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# split panes using | and -
bind | split-window -h
bind - split-window -v
unbind '"'
unbind %

# Start window and pane indices at 1.
set -g base-index 1
set -g pane-base-index 0

# Set the history limit so we get lots of scrollback.
setw -g history-limit 50000000
setw -g mouse on

# ── Monokai status bar ────────────────────────────────────────────────
# Palette: bg #272822  fg #F8F8F2  pink #F92672  green #A6E22E
#          yellow #E6DB74  orange #FD971F  blue #66D9EF  purple #AE81FF
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Base bar
set -g status-style "bg=#272822,fg=#F8F8F2"

# Left: session name in bold pink block
set -g status-left-length 40
set -g status-left "#[bg=#EB6F92,fg=#272822,bold] #S #[bg=#272822,fg=#EB6F92]"

# Right: path · time · date
set -g status-right-length 80
set -g status-right "#[fg=#75715E]#[bg=#75715E,fg=#F8F8F2] #(echo '#{pane_current_path}' | sed 's|^$HOME|~|') #[bg=#272822,fg=#66D9EF]#[bg=#66D9EF,fg=#272822,bold] %H:%M #[fg=#A6E22E]#[bg=#A6E22E,fg=#272822,bold] %a %d %b "

# Windows
set -g window-status-separator ""
set -g window-status-format         "#[bg=#272822,fg=#75715E]  #I #W  "
set -g window-status-current-format "#[bg=#272822,fg=#FD971F]#[bg=#FD971F,fg=#272822,bold] #I #W #[bg=#272822,fg=#FD971F]"
set -g window-status-activity-style "bg=#272822,fg=#E6DB74,bold"

# Panes & messages
set -g pane-border-style          "fg=#49483E"
set -g pane-active-border-style   "fg=#EB6F92"
set -g message-style              "bg=#E6DB74,fg=#272822,bold"
set -g message-command-style      "bg=#E6DB74,fg=#272822,bold"
set -g mode-style                 "bg=#AE81FF,fg=#272822,bold"

# Install plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-sessionizer'

# tmux-sessionizer
bind-key -r b run-shell "tmux neww ~/.tmux/plugins/tmux-sessionizer/sessionizer.tmux"

run '~/.tmux/plugins/tpm/tpm'
